<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mavs Hats | Iniciar Sesión</title>
        <style>
            /* --- VARIABLES DE DISEÑO (Combinadas con Catálogo) --- */
            :root {
                --negro-pro: #1a1a1a;
                --dorado: #c5a059;
                --gris-claro: #f4f4f4;
                --blanco: #ffffff;
                --exito: #27ae60;
                --error: #e74c3c;
            }

            body { 
                font-family: 'Poppins', sans-serif; 
                background-color: var(--gris-claro); 
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            .form-login { 
                background: var(--blanco); 
                padding: 40px; 
                border: 2px solid var(--dorado);
                max-width: 400px; 
                width: 90%;
                box-shadow: 0px 10px 25px rgba(0,0,0,0.1); 
            }

            .form-login h2 {
                text-align: center;
                text-transform: uppercase;
                letter-spacing: 2px;
                font-size: 1.5rem;
                margin-top: 0;
                margin-bottom: 25px;
                color: var(--negro-pro);
            }

            .campo { margin-bottom: 20px; }
            
            .campo label { 
                display: block; 
                margin-bottom: 8px; 
                font-weight: bold; 
                font-size: 0.85rem;
                text-transform: uppercase;
                color: #555;
            }

            .campo input { 
                width: 100%; 
                padding: 12px; 
                box-sizing: border-box; 
                border: 1px solid #ddd; 
                border-radius: 0; 
                font-size: 1rem;
                transition: 0.3s;
            }

            .campo input:focus {
                outline: none;
                border-color: var(--dorado);
            }

            .btn { 
                background-color: var(--negro-pro); 
                color: white; 
                border: none; 
                padding: 14px; 
                width: 100%; 
                cursor: pointer; 
                font-size: 1rem; 
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 1px;
                transition: 0.3s; 
            }

            .btn:hover { 
                background-color: var(--dorado); 
                color: var(--negro-pro);
            }

            .registro-link { 
                text-align: center; 
                margin-top: 25px; 
                font-size: 14px; 
                color: #666;
            }

            .registro-link a { 
                color: var(--dorado); 
                text-decoration: none; 
                font-weight: bold; 
                cursor: pointer; 
            }
            
            .registro-link a:hover {
                text-decoration: underline;
            }

            .error-msg { 
                color: var(--error); 
                background-color: #fdedec;
                padding: 10px;
                font-size: 14px; 
                margin-bottom: 20px; 
                display: none; 
                text-align: center; 
                font-weight: bold; 
            }

            .success-msg { 
                color: var(--exito); 
                background-color: #e8f8f5;
                padding: 10px;
                font-size: 14px; 
                margin-bottom: 20px; 
                display: none; 
                text-align: center; 
                font-weight: bold; 
            }

            .loading { 
                background-color: var(--dorado) !important; 
                color: var(--negro-pro) !important;
                cursor: not-allowed; 
            }
        </style>
    </head>
    <body>

        <div class="form-login" id="vistaLogin">
            <h2 id="tituloForm">Mavs Hats</h2>
            
            <div class="error-msg" id="errorLogin">Correo o contraseña incorrectos.</div>
            <div class="success-msg" id="infoRegistro"></div>

            <form onsubmit="procesarLogin(event)">
                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" id="loginCorreo" required placeholder="ejemplo@correo.com">
                </div>
                <div class="campo">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required placeholder="******">
                </div>
                <button type="submit" id="btnIngresar" class="btn">Ingresar</button>
            </form>
            
            <div class="registro-link">
                ¿Eres nuevo? <a onclick="mostrarRegistro(true)">Crear cuenta nueva</a>
            </div>
        </div>

        <div class="form-login" id="vistaRegistro" style="display: none;">
            <h2>Crear Cuenta</h2>
            <div class="error-msg" id="errorRegistro">Este correo ya está registrado.</div>
            
            <form onsubmit="procesarRegistro(event)">
                <div class="campo">
                    <label>Nombre Completo</label>
                    <input type="text" id="regNombre" required placeholder="Tu nombre">
                </div>
                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" id="regCorreo" required placeholder="correo@ejemplo.com">
                </div>
                <div class="campo">
                    <label>Contraseña</label>
                    <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" class="btn" style="background-color: var(--exito);">Registrarse</button>
            </form>
            
            <div class="registro-link">
                ¿Ya tienes cuenta? <a onclick="mostrarRegistro(false)">Regresar al Login</a>
            </div>
        </div>

        <script>
            // Creamos un usuario Administrador por defecto si el LocalStorage está vacío
            if (!localStorage.getItem("admin@gorras.com")) {
                localStorage.setItem("admin@gorras.com", JSON.stringify({ password: "123", nombre: "Admin" }));
            }

            // Alternar entre pantallas
            function mostrarRegistro(irARegistro) {
                document.getElementById("errorLogin").style.display = "none";
                document.getElementById("errorRegistro").style.display = "none";
                document.getElementById("infoRegistro").style.display = "none";
                
                if(irARegistro) {
                    document.getElementById("vistaLogin").style.display = "none";
                    document.getElementById("vistaRegistro").style.display = "block";
                } else {
                    document.getElementById("vistaLogin").style.display = "block";
                    document.getElementById("vistaRegistro").style.display = "none";
                }
            }

            // REGISTRO: Guarda los datos de forma local en el navegador
            function procesarRegistro(event) {
                event.preventDefault();
                const correo = document.getElementById("regCorreo").value.trim().toLowerCase();
                const password = document.getElementById("regPassword").value;
                const nombre = document.getElementById("regNombre").value;

                // Validar si ya existe
                if (localStorage.getItem(correo)) {
                    document.getElementById("errorRegistro").style.display = "block";
                    return;
                }

                // Guardar en la "Base de Datos" local del navegador
                const datosUsuario = { password: password, nombre: nombre };
                localStorage.setItem(correo, JSON.stringify(datosUsuario));

                // Limpiar campos y volver al login con éxito
                document.getElementById("regCorreo").value = "";
                document.getElementById("regPassword").value = "";
                document.getElementById("regNombre").value = "";
                
                mostrarRegistro(false);
                
                const msg = document.getElementById("infoRegistro");
                msg.innerText = "¡Cuenta registrada! Ya puedes iniciar sesión.";
                msg.style.display = "block";
                document.getElementById("loginCorreo").value = correo;
            }

            // LOGIN: Valida contra la simulación local de base de datos
            function procesarLogin(event) {
                event.preventDefault();
                document.getElementById("errorLogin").style.display = "none";
                document.getElementById("infoRegistro").style.display = "none";

                const correo = document.getElementById("loginCorreo").value.trim().toLowerCase();
                const password = document.getElementById("loginPassword").value;

                // Buscar usuario en LocalStorage
                const usuarioGuardado = localStorage.getItem(correo);

                if (usuarioGuardado) {
                    const datos = JSON.parse(usuarioGuardado);
                    
                    // Validar contraseña exacta
                    if (datos.password === password) {
                        const boton = document.getElementById("btnIngresar");
                        boton.innerText = "Validando Credenciales...";
                        boton.classList.add("loading");
                        boton.disabled = true;

                        // Retraso de 1.2 segundos para simular respuesta del servidor de forma estética
                        setTimeout(() => {
                            window.location.href = "catalogo.html";
                        }, 1200);
                        return;
                    }
                }

                // Si no existe o los datos están mal
                document.getElementById("errorLogin").style.display = "block";
            }
        </script>
    </body>
</html>
